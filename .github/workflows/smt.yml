name: Build and Push Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 必须步骤 1：登录 Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 必须步骤 2：开启 aarch64 模拟支持（没这个打包会报错）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 核心修正：使用 Ubuntu 22.04 提供高版本 GLIBC 支持
      - name: Create temporary Dockerfile
        run: |
          cat <<EOF > Dockerfile
          # 显式指定 arm64 架构，适配爪云
          FROM --platform=linux/arm64 ubuntu:22.04
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && \
              apt-get install -y --no-install-recommends ca-certificates libc6 libssl3 && \
              rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          # 既然你仓库文件叫 smt_rust，这里直接 COPY
          COPY smt_rust /app/smt_rust
          RUN chmod +x /app/smt_rust
          ENTRYPOINT ["/app/smt_rust"]
          EOF

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 关键：告诉 Docker 这是 arm64 镜像
          platforms: linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/smt-rust:latest
