name: Build and Push Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 关键步骤：必须安装 QEMU 才能让 x86 服务器处理 arm64 文件
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          # 这里一定要加上 --platform=linux/arm64
          FROM --platform=linux/arm64 ubuntu:22.04
          RUN apt-get update && apt-get install -y --no-install-recommends ca-certificates libc6 libssl3 && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY smt_rust /app/smt_rust
          RUN chmod +x /app/smt_rust
          ENTRYPOINT ["/app/smt_rust"]
          EOF

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 这里是重中之重！强制指定平台为 arm64
          platforms: linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/smt-rust:latest
