name: Build and Push Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 这一步是关键：自动寻找并改名，确保 Dockerfile 能找到文件
      - name: Prepare binary
        run: |
          # 寻找带括号的文件名并重命名为 smt_rust
          if [ -f "tms_rust (1)" ]; then
            mv "tms_rust (1)" smt_rust
          elif [ -f "tms_rust" ]; then
            mv "tms_rust" smt_rust
          fi
          chmod +x smt_rust

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create temporary Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM --platform=linux/arm64 ubuntu:22.04
          RUN apt-get update && apt-get install -y --no-install-recommends ca-certificates libssl3 && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          # 此时这里引用的 smt_rust 已经在上一步准备好了
          COPY smt_rust /app/smt_rust
          RUN chmod +x /app/smt_rust
          ENTRYPOINT ["/app/smt_rust"]
          EOF

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 适配爪云 aarch64 架构
          platforms: linux/arm64
          # 使用你要求的镜像名 smt-rust
          tags: ${{ secrets.DOCKER_USERNAME }}/smt-rust:latest
